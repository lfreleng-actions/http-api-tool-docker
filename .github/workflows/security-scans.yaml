# This workflow uses actions that are not certified by GitHub. They are provided
# by a third-party and are governed by separate terms of service, privacy
# policy, and support documentation.

name: "Security Scans"
on:
  workflow_dispatch:
  # For Branch-Protection check. Only the default branch is supported. See
  # https://github.com/ossf/scorecard/blob/main/docs/checks.md#branch-protection
  branch_protection_rule:
  # To guarantee Maintained check is occasionally updated. See
  # https://github.com/ossf/scorecard/blob/main/docs/checks.md#maintained
  schedule:
    - cron: "31 3 * * 0"
  push:
    branches: ["main", "master"]
    paths:
      - "**"
      - "!.github/**"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonatype-lifecycle:
    name: "Sonatype Lifecycle"
    permissions:
      contents: read  # Reusable scan job checks out the repo
    # yamllint disable-line rule:line-length
    uses: lfit/releng-reusable-workflows/.github/workflows/reuse-sonatype-lifecycle.yaml@5fa62e396473e823e2bb0f45b744e94c4f842faa # v0.7.4
    secrets:
      NEXUS_IQ_PASSWORD: ${{ secrets.NEXUS_IQ_PASSWORD }}

  # Scan results are found at: https://sonarcloud.io/login
  sonarqube-cloud:
    name: "SonarQube Cloud"
    # yamllint disable-line rule:line-length
    uses: lfit/releng-reusable-workflows/.github/workflows/reuse-sonarqube-cloud.yaml@5fa62e396473e823e2bb0f45b744e94c4f842faa # v0.7.4
    permissions:
      contents: read  # Reusable scan job checks out the repo
      security-events: write  # Upload results to the code-scanning dashboard
      id-token: write  # Publish results and obtain a badge via OIDC
      # Uncomment the permission below if installing in a private repository.
      # actions: read
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
